<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global System Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="max-w-xl w-full bg-white shadow-2xl rounded-2xl overflow-hidden">
        <div class="bg-emerald-600 p-6">
            <h1 class="text-white text-2xl font-bold">System Localization</h1>
            <p id="status-msg" class="text-emerald-100 text-sm italic">Syncing with global servers...</p>
        </div>

        <div class="p-8 space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Country of Origin</label>
                <select id="country-select" class="w-full"></select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Timezone</label>
                <select id="timezone-select" class="w-full p-3 border border-gray-300 rounded-lg bg-white outline-none focus:ring-2 focus:ring-emerald-500 transition-all"></select>
            </div>

            <div class="p-6 bg-slate-50 border-l-4 border-emerald-500 rounded-r-lg">
                <label class="block text-xs uppercase tracking-widest text-slate-500 font-bold mb-2">Current System Time</label>
                <div id="clock-display" class="text-xl md:text-2xl font-semibold text-slate-800">
                    Loading time...
                </div>
                <div id="currency-info" class="text-sm text-emerald-600 font-medium mt-1"></div>
            </div>

            <button onclick="alert('Configuration Saved Successfully!')" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-[0.98]">
                Complete System Setup
            </button>
        </div>
    </div>

    <script>
        let countriesData = [];
        let choicesInstance;
        const countryEl = document.getElementById('country-select');
        const tzSelect = document.getElementById('timezone-select');
        const clockDisplay = document.getElementById('clock-display');
        const currencyInfo = document.getElementById('currency-info');

        choicesInstance = new Choices(countryEl, { searchEnabled: true, itemSelectText: '' });

        async function initSystem() {
            try {
                const response = await fetch('data.json');
                countriesData = await response.json();
                
                const list = countriesData.map(c => ({ value: c.code, label: `${c.name} (${c.code})` }))
                             .sort((a, b) => a.label.localeCompare(b.label));
                choicesInstance.setChoices(list, 'value', 'label', true);

                // Auto-detect location
                const geoRes = await fetch('https://ipapi.co/json/');
                const geoData = await geoRes.json();
                updateUI(geoData.country_code, geoData.timezone);
            } catch (err) {
                console.error("Initialization failed", err);
            }
        }

        function updateUI(countryCode, preferredTimezone = null) {
            const country = countriesData.find(c => c.code === countryCode);
            if (!country) return;

            choicesInstance.setChoiceByValue(country.code);
            currencyInfo.innerText = `Standard Currency: ${country.currency}`;

            tzSelect.innerHTML = '';
            country.zones.forEach(zone => {
                let opt = new Option(zone, zone);
                if (zone === preferredTimezone) opt.selected = true;
                tzSelect.add(opt);
            });
            
            updateClock(); 
        }

        function updateClock() {
            const selectedZone = tzSelect.value;
            if (!selectedZone) return;

            const now = new Date();
            
            // Format: Monday, 2 March 2026, 2:03 pm
            const options = {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true,
                timeZone: selectedZone
            };

            const formatter = new Intl.DateTimeFormat('en-GB', options);
            let parts = formatter.formatToParts(now);
            
            // Custom construction to match your EXACT format (comma placement)
            const weekday = parts.find(p => p.type === 'weekday').value;
            const day = parts.find(p => p.type === 'day').value;
            const month = parts.find(p => p.type === 'month').value;
            const year = parts.find(p => p.type === 'year').value;
            const hour = parts.find(p => p.type === 'hour').value;
            const minute = parts.find(p => p.type === 'minute').value;
            const dayPeriod = parts.find(p => p.type === 'dayPeriod').value.toLowerCase();

            clockDisplay.innerText = `${weekday}, ${day} ${month} ${year}, ${hour}:${minute} ${dayPeriod}`;
        }

        // Run clock every second
        setInterval(updateClock, 1000);

        countryEl.addEventListener('change', (e) => updateUI(e.detail.value));
        tzSelect.addEventListener('change', updateClock);

        initSystem();
    </script>
</body>
</html>

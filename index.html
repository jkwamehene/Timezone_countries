<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Country/Timezone Config</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; line-height: 1.6; }
    select, button { padding: 0.75rem 1rem; margin: 0.5rem 0.25rem 0 0; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem; }
    button { background: #3b82f6; color: white; border: none; cursor: pointer; }
    button:hover { background: #2563eb; }
    .info { background: #f0f9ff; padding: 1.5rem; border-radius: 0.75rem; margin: 1.5rem 0; border-left: 4px solid #3b82f6; }
    .loading { opacity: 0.6; }
    code { background: #f8fafc; padding: 0.25rem 0.5rem; border-radius: 0.375rem; font-family: 'Courier New', monospace; font-size: 0.875rem; }
    h1 { color: #1f2937; }
    h2 { color: #374151; }
    .status { font-weight: bold; color: #059669; }
  </style>
</head>
<body>
  <h1>🌍 Dynamic Country/Timezone Setup</h1>
  <p>Select country → Auto-loads currencies & timezones → Converts UTC time.</p>

  <div>
    <label>🇬🇭 Country: 
      <select id="countrySelect" onchange="loadCountryData()">
        <option value="">Loading countries...</option>
      </select>
    </label>
    
    <div id="info" class="info" style="display:none;">
      <strong>Currency:</strong> <span id="currency"></span><br>
      <strong>Timezones:</strong> <span id="timezones"></span><br>
      <strong>Selected TZ:</strong> 
      <select id="timeZoneSelect"></select>
    </div>
    
    <button onclick="convertTime()">🔄 Convert UTC Now</button>
  </div>

  <div id="result"></div>

  <script>
    // Load all countries from REST Countries API (free, no key)
    async function loadCountries() {
      try {
        const res = await fetch('https://restcountries.com/v3.1/all?fields=name,cca2,currencies,timezones');
        const countries = await res.json();
        
        const select = document.getElementById('countrySelect');
        select.innerHTML = '<option value="">Select Country</option>';
        
        // Sort alphabetically
        countries.sort((a, b) => a.name.common.localeCompare(b.name.common));
        
        countries.forEach(country => {
          const option = document.createElement('option');
          option.value = country.cca2;  // ISO code like "GH"
          option.textContent = country.name.common;
          select.appendChild(option);
        });
        
        document.body.classList.remove('loading');
      } catch (err) {
        document.getElementById('countrySelect').innerHTML = '<option>API Error - Load fallback</option>';
        console.error('API failed:', err);
      }
    }

    // Load country details (currencies, timezones)
    async function loadCountryData() {
      const countryCode = document.getElementById('countrySelect').value;
      const infoDiv = document.getElementById('info');
      
      if (!countryCode) {
        infoDiv.style.display = 'none';
        return;
      }
      
      try {
        infoDiv.classList.add('loading');
        const res = await fetch(`https://restcountries.com/v3.1/alpha/${countryCode}?fields=currencies,timezones,name`);
        const [country] = await res.json();
        
        // Currency
        const currencies = country.currencies;
        const currencyList = Object.values(currencies).map(c => `${c.name} (${c.code})`).join(', ');
        document.getElementById('currency').textContent = currencyList || 'N/A';
        
        // Timezones
        const tzs = country.timezones.join(', ');
        document.getElementById('timezones').textContent = tzs || 'N/A';
        
        // Populate timezone dropdown (pick first as default)
        const tzSelect = document.getElementById('timeZoneSelect');
        tzSelect.innerHTML = '';
        country.timezones.forEach(tz => {
          const option = document.createElement('option');
          option.value = tz;
          option.textContent = tz;
          tzSelect.appendChild(option);
        });
        
        infoDiv.style.display = 'block';
        infoDiv.classList.remove('loading');
      } catch (err) {
        console.error('Country load failed:', err);
      }
    }

    // Convert UTC to selected timezone
    function convertTime() {
      const utcNow = new Date().toISOString();
      const tz = document.getElementById('timeZoneSelect').value;
      
      if (!tz) {
        document.getElementById('result').innerHTML = '<p style="color:orange;">Select a country first!</p>';
        return;
      }
      
      const local = new Date(utcNow).toLocaleString('en-GB', {
        timeZone: tz,
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit', timeZoneName: 'short'
      });
      
      document.getElementById('result').innerHTML = `
        <div class="info">
          <strong>🌐 UTC:</strong> ${utcNow.slice(0,19).replace('T',' ')}Z<br>
          <strong>📍 ${tz}:</strong> ${local}<br>
          <code>new Date().toLocaleString({ timeZone: '${tz}' })</code>
          <br><small>Dynamic via restcountries.com API</small>
        </div>
      `;
    }

    // Init
    loadCountries();
  </script>
</body>
</html>

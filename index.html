<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Country/Timezone Config (USA Multi-Zone Ready)</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1000px; margin: 0 auto; padding: 2rem; line-height: 1.6; }
    select, button { padding: 0.75rem 1rem; margin: 0.5rem 0.25rem 0 0; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem; }
    button { background: #8b5cf6; color: white; border: none; cursor: pointer; }
    button:hover { background: #7c3aed; }
    .info { background: #f3e8ff; padding: 1.5rem; border-radius: 0.75rem; margin: 1.5rem 0; border-left: 4px solid #8b5cf6; }
    .usa-note { background: #fef3c7; border-left-color: #f59e0b; margin-top: 1rem; padding: 1rem; border-radius: 0.5rem; }
    .loading { opacity: 0.6; }
    code { background: #f8fafc; padding: 0.25rem 0.5rem; border-radius: 0.375rem; font-family: 'Courier New', monospace; }
    h1 { color: #1f2937; }
    h2 { color: #374151; border-bottom: 2px solid #8b5cf6; padding-bottom: 0.5rem; }
    .flag { font-size: 1.5rem; margin-right: 0.5rem; }
    .status { font-weight: bold; color: #7c2d12; }
  </style>
</head>
<body>
  <h1>🌍 Pro Config: Country → Auto-Timezone/Currency</h1>
  <p><strong>USA Ready:</strong> Handles 11 timezones + state suggestions!</p>

  <div>
    <label><strong>🏠 Country of Origin:</strong><br>
      <select id="countrySelect" onchange="loadCountryData()">
        <option value="">🔄 Loading 250+ countries...</option>
      </select>
    </label>
    <br>
    <button onclick="autoDetectUser()">🎯 Auto-Detect My Location</button>
  </div>

  <div id="info" class="info" style="display:none;">
    <div id="countryFlag" class="flag"></div>
    <strong>📍 Code:</strong> <span id="countryCode"></span><br>
    <strong>💰 Currency:</strong> <span id="currency"></span><br>
    <strong>🕐 Timezone:</strong> 
    <select id="timeZoneSelect" onchange="convertTime()"></select>
    <div id="usaNote" class="usa-note" style="display:none;">
      <strong>🇺🇸 USA?</strong> Pick your state/city timezone (11 total)
    </div>
  </div>

  <div id="result"></div>

  <script>
    let currentCountryData = null;

    // US State → Timezone mapping
    const usStateTimezones = {
      "Alabama": "America/Chicago",
      "Alaska": "America/Anchorage",
      "Arizona": "America/Phoenix",
      "California": "America/Los_Angeles",
      "New York": "America/New_York",
      "Texas": "America/Chicago",
      "Florida": "America/New_York",
      "Illinois": "America/Chicago"
    }[code_file:1];

    async function loadCountries() {
      try {
        const res = await fetch('https://restcountries.com/v3.1/all?fields=name,cca2,cca3,flag,currencies,timezones');
        const countries = await res.json();
        
        const select = document.getElementById('countrySelect');
        select.innerHTML = '<option value="">Select Country</option>';
        
        countries.sort((a, b) => a.name.common.localeCompare(b.name.common));
        
        countries.forEach(country => {
          const option = document.createElement('option');
          option.value = country.cca2;
          option.textContent = `${country.flag} ${country.name.common}`;
          select.appendChild(option);
        });
        
        autoDetectUser();  // Try auto-detect on load
      } catch (err) {
        console.error('Load failed:', err);
      }
    }

    async function loadCountryData() {
      const countryCode = document.getElementById('countrySelect').value;
      const infoDiv = document.getElementById('info');
      
      if (!countryCode) {
        infoDiv.style.display = 'none';
        return;
      }
      
      try {
        infoDiv.classList.add('loading');
        const res = await fetch(`https://restcountries.com/v3.1/alpha/${countryCode}?fields=name,cca2,cca3,flag,currencies,timezones`);
        const [country] = await res.json();
        currentCountryData = country;
        
        document.getElementById('countryFlag').innerHTML = country.flag;
        document.getElementById('countryCode').textContent = `${country.cca2} / ${country.cca3}`;
        
        // Currency
        const currencies = country.currencies;
        document.getElementById('currency').textContent = currencies ? 
          Object.entries(currencies).map(([k,v]) => `${v.name} (${k})`).join(', ') : 'N/A';
        
        // Timezones - auto-select first
        const tzs = country.timezones || [];
        const tzSelect = document.getElementById('timeZoneSelect');
        tzSelect.innerHTML = '';
        tzs.forEach((tz, i) => {
          const option = document.createElement('option');
          option.value = tz;
          option.textContent = tz;
          if (i === 0) option.selected = true;
          tzSelect.appendChild(option);
        });
        
        // USA note
        document.getElementById('usaNote').style.display = countryCode === 'US' ? 'block' : 'none';
        
        infoDiv.style.display = 'block';
        infoDiv.classList.remove('loading');
        convertTime();
        
      } catch (err) {
        console.error(err);
      }
    }

    function convertTime() {
      if (!currentCountryData?.timezones?.length) return;
      
      const utcNow = new Date();
      const tz = document.getElementById('timeZoneSelect').value;
      
      const local = utcNow.toLocaleString('en-GB', {
        timeZone: tz,
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        timeZoneName: 'short'
      });
      
      document.getElementById('result').innerHTML = `
        <div class="info">
          <strong>🌐 UTC:</strong> ${utcNow.toISOString().slice(0,19).replace('T',' ')}Z<br>
          <strong>📱 ${tz}:</strong> ${local}<br>
          <span class="status">✅ ${currentCountryData.flag} ${currentCountryData.name.common} Configured</span>
        </div>
      `;
    }

    // IP Auto-detect (free)
    async function autoDetectUser() {
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        
        const country = data.country_code;
        if (country && document.querySelector(`#countrySelect option[value="${country}"]`)) {
          document.getElementById('countrySelect').value = country;
          await loadCountryData();
          
          // Suggest city timezone
          const cityTz = data.timezone;
          const tzOption = document.querySelector(`#timeZoneSelect option[value="${cityTz}"]`);
          if (tzOption) {
            tzOption.selected = true;
            convertTime();
          }
        }
      } catch (e) {
        console.log('Auto-detect unavailable');
      }
    }

    loadCountries();
  </script>
</body>
</html>
